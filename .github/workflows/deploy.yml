name: Deploy All Branches to GitHub Pages

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout all branches
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Prepare pages for all branches
      run: |
        set -euo pipefail
        rm -rf deploy
        mkdir deploy
        git fetch --all --prune

        for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin); do
          branch=${ref#origin/}
          if [ "$branch" = "gh-pages" ] || [ "$branch" = "HEAD" ]; then
            continue
          fi

          worktree_dir="__worktree_$(echo "$branch" | tr '/' '-')"
          git worktree add "$worktree_dir" "$ref"

          target="deploy"
          if [ "$branch" != "main" ]; then
            target="deploy/$branch"
            mkdir -p "$target"
          fi

          if [ -d "$worktree_dir/src" ]; then
            rsync -a --delete "$worktree_dir/src/" "$target/"
          else
            echo "Skipping $branch (no src directory)" >&2
          fi

          git worktree remove "$worktree_dir" --force
        done
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: deploy

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
