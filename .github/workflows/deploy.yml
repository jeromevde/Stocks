name: Deploy All Branches to GitHub Pages

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout all branches
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Prepare pages for all branches
      run: |
        set -euo pipefail
        rm -rf deploy
        mkdir deploy
        git fetch --all --prune

        echo "📦 Processing branches..."
        
        # Get all remote branches (excluding HEAD and gh-pages)
        git branch -r | grep -v 'HEAD' | grep -v 'gh-pages' | sed 's|origin/||' | while read branch; do
          echo ""
          echo "🔨 Processing branch: $branch"
          
          worktree_dir="__worktree_$(echo "$branch" | tr '/' '-')"
          git worktree add "$worktree_dir" "origin/$branch"

          target="deploy"
          if [ "$branch" != "main" ]; then
            target="deploy/$branch"
            mkdir -p "$target"
            echo "   Target: /$branch/"
          else
            echo "   Target: / (root)"
          fi

          if [ -d "$worktree_dir/src" ]; then
            echo "   📁 Copying src/ contents..."
            rsync -a --delete "$worktree_dir/src/" "$target/"
            file_count=$(find "$target" -type f | wc -l)
            echo "   ✅ Copied $file_count files"
          else
            echo "   ⚠️  No src directory, skipping"
          fi

          git worktree remove "$worktree_dir" --force
        done
        
        echo ""
        echo "📊 Final deployment structure:"
        find deploy -type f | sort
        
        echo ""
        echo "📁 Directory tree:"
        find deploy -type d | sort
        
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: deploy

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
