name: Deploy All Branches to GitHub Pages

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout all branches
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Prepare pages for all branches
      run: |
        set -euo pipefail
        rm -rf deploy
        mkdir deploy
        git fetch --all --prune

        echo "📦 Processing branches..."
        
        # Process main branch first to root
        echo ""
        echo "🔨 Processing branch: main"
        git worktree add __wt_main origin/main
        if [ -d "__wt_main/src" ]; then
          echo "   📁 Copying src/ to root..."
          rsync -a __wt_main/src/ deploy/
          file_count=$(find deploy -maxdepth 1 -type f | wc -l)
          echo "   ✅ Copied $file_count files to root"
        fi
        git worktree remove __wt_main --force
        
        # Process other branches to subdirectories
        git branch -r | grep -v 'HEAD' | grep -v 'gh-pages' | grep -v 'main' | sed 's|origin/||' | while read branch; do
          echo ""
          echo "🔨 Processing branch: $branch"
          
          worktree_dir="__worktree_$(echo "$branch" | tr '/' '-')"
          git worktree add "$worktree_dir" "origin/$branch"

          target="deploy/$branch"
          mkdir -p "$target"
          echo "   Target: /$branch/"

          if [ -d "$worktree_dir/src" ]; then
            echo "   📁 Copying src/ contents..."
            rsync -a "$worktree_dir/src/" "$target/"
            file_count=$(find "$target" -type f | wc -l)
            echo "   ✅ Copied $file_count files"
          else
            echo "   ⚠️  No src directory, skipping"
          fi

          git worktree remove "$worktree_dir" --force
        done
        
        echo ""
        echo "📊 Final deployment structure:"
        find deploy -type f | sort
        
        echo ""
        echo "📁 Directory tree:"
        find deploy -type d | sort
        
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: deploy

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
