name: Deploy All Branches to GitHub Pages

on:
  push:
    branches: [ '**' ]
  delete:
    branches: [ '**' ]
  workflow_dispatch:

# IMPORTANT: Don't cancel in-progress deployments.
# If main and dev push at the same time, they must run sequentially
# to avoid one overwriting the other's changes.
concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'delete' || github.event.ref_type == 'branch'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout all branches
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need all history for worktrees

    - name: Build deploy directory
      run: |
        set -euo pipefail
        rm -rf deploy
        mkdir deploy
        git fetch --all --prune

        deleted_branch="${{ github.event.ref }}"
        event_name="${{ github.event_name }}"

        echo "📦 Building complete deployment package..."
        echo "   Triggered by: $event_name"
        if [ "$event_name" = "delete" ]; then
          echo "   Deleted branch: $deleted_branch"
        else
          echo "   Pushed branch: ${{ github.ref_name }}"
        fi
        echo ""

        # Process main branch first (root)
        if git show-ref --verify --quiet refs/remotes/origin/main; then
          echo "🔨 Processing: main -> /"
          git worktree add __wt_main origin/main
          if [ -d "__wt_main/src" ]; then
            rsync -a __wt_main/src/ deploy/
            echo "   ✅ Copied to root"
          fi
          git worktree remove __wt_main --force
        fi

        # Process all other branches to subdirectories
        for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin); do
          branch=${ref#origin/}
          
          # Skip main (already done), HEAD, and gh-pages
          if [ "$branch" = "main" ] || [ "$branch" = "HEAD" ] || [ "$branch" = "gh-pages" ]; then
            continue
          fi

          echo "🔨 Processing: $branch -> /$branch/"
          
          worktree_dir="__wt_$(echo "$branch" | tr '/' '-')"
          git worktree add "$worktree_dir" "$ref"

          if [ -d "$worktree_dir/src" ]; then
            mkdir -p "deploy/$branch"
            rsync -a "$worktree_dir/src/" "deploy/$branch/"
            echo "   ✅ Copied to /$branch/"
          else
            echo "   ⚠️  No src directory, skipping"
          fi

          git worktree remove "$worktree_dir" --force
        done

        echo ""
        echo "📊 Deployment summary:"
        echo "   Directories: $(find deploy -type d | wc -l)"
        echo "   Files: $(find deploy -type f | wc -l)"
        echo ""
        echo "📁 Structure:"
        find deploy -type d | sort

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: deploy

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
